<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>差分詳細</title>
  <link rel="stylesheet" href="https://unpkg.com/diff2html/bundles/css/diff2html.min.css">
  <style>
    body{margin:0;padding:16px;background:#f6f8fa;color:#222;font:14px/1.5 Segoe UI,system-ui,sans-serif}
    .panel{background:#fff;border:1px solid #e6edf3;border-radius:12px;padding:16px;margin-bottom:16px}
    .meta{display:grid;gap:6px;margin-bottom:12px}
    #diffOutput{background:#fff;border:1px solid #e6edf3;border-radius:12px;padding:12px;overflow:auto}
    #diffOutput .d2h-wrapper{min-width:960px}
    .status{font-size:13px;color:#6e7781}
    .status.error{color:#cf222e}
  </style>
</head>
<body>
  <section class="panel">
    <div class="meta">
      <strong id="fileName">差分詳細</strong>
      <span id="filePath"></span>
      <span id="counts"></span>
    </div>
    <p id="statusText" class="status">読込中...</p>
  </section>
  <section id="diffOutput"></section>

  <script src="https://unpkg.com/diff2html/bundles/js/diff2html.min.js"></script>
  <script>
    function query(name) {
      return new URLSearchParams(window.location.search).get(name) || '';
    }

    function setStatus(message, kind) {
      var node = document.getElementById('statusText');
      node.textContent = message;
      node.className = kind ? 'status ' + kind : 'status';
    }

    function render(data) {
      document.getElementById('fileName').textContent = data.fileName || '差分詳細';
      document.getElementById('filePath').textContent = (data.filePath || '') + (data.hunkHeader ? '  ' + data.hunkHeader : '');
      document.getElementById('counts').textContent = '+' + data.additions + ' / -' + data.deletions;
      document.getElementById('diffOutput').innerHTML = Diff2Html.html(data.diffText || '', {
        drawFileList: false,
        matching: 'lines',
        outputFormat: 'side-by-side'
      });
      setStatus('表示しました', '');
    }

    google.script.run
      .withSuccessHandler(render)
      .withFailureHandler(function(error) {
        setStatus(error.message || String(error), 'error');
      })
      .getDiffDetail(query('spreadsheetId'), query('fileKey'));
  </script>
</body>
</html>
