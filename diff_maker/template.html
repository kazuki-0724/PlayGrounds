<!doctype html>
<html lang="ja">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Diff Viewer (diff2html)</title>
	<link rel="stylesheet" href="https://unpkg.com/diff2html/bundles/css/diff2html.min.css">
	<link rel="stylesheet" href="https://unpkg.com/diff2html/bundles/css/diff2html-ui.min.css">
	<style>
		body{font-family:Segoe UI,system-ui,Roboto,"Noto Sans JP",sans-serif;margin:0;padding:0;background:#f6f8fa;color:#222}
		header{background:#24292e;color:#fff;padding:12px 16px}
		.container{padding:16px;max-width:1100px;margin:12px auto}
		.controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
		.dropzone{flex:1;min-width:240px;padding:14px;border:2px dashed #cbd5e1;border-radius:8px;background:#fff;cursor:pointer}
		textarea{Width:100%;height:140px;padding:8px;border-radius:6px;border:1px solid #d1d5db;resize:vertical}
		.actions{display:flex;gap:8px}
		.btn{background:#0366d6;color:#fff;padding:8px 12px;border-radius:6px;border:none;cursor:pointer}
		.btn.secondary{background:#6a737d}
		#diffOutput{background:#fff;padding:12px;border-radius:6px;border:1px solid #e6edf3;overflow:auto}
		#diffOutput .d2h-wrapper{min-width:960px}
		.file-toggle{position:absolute;top:7px;right:10px;z-index:2;background:#eef3f8;color:#24292e;border:1px solid #d0d7de;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer}
		.d2h-file-header{position:relative;display:flex;align-items:center;gap:8px;padding-right:92px}
		.d2h-file-wrapper.is-collapsed .d2h-file-diff,
		.d2h-file-wrapper.is-collapsed .d2h-files-diff{display:none}
		footer{font-size:12px;color:#555;margin:16px 0}
		@media (max-width:640px){.controls{flex-direction:column}}
	</style>
</head>
<body>
	<header>
		<strong>Diff Viewer</strong> — Upload or paste a unified diff / patch file
	</header>
	<main class="container">
		<div class="controls">
			<label class="dropzone" id="dropzone">ファイルをドラッグ＆ドロップ、またはクリックして選択</label>
			<input type="file" id="fileInput" accept=".diff,.patch,text/*" style="display:none">
			<div style="flex:1;min-width:280px">
				<label for="pasteArea">または差分を貼り付け</label>
				<textarea id="pasteArea" placeholder="ここに unified diff を貼り付けてください"></textarea>
				<div class="actions" style="margin-top:8px">
					<button id="renderBtn" class="btn">表示</button>
					<button id="clearBtn" class="btn secondary">クリア</button>
				</div>
			</div>
		</div>

		<div id="diffOutput"></div>

		<footer>
			サポート: unified diff / git diff / patch ファイル。左右2ペインの side-by-side 表示と file-list を含みます。
		</footer>
	</main>

	<script src="https://unpkg.com/diff2html/bundles/js/diff2html.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
	<script>
		const fileInput = document.getElementById('fileInput');
		const dropzone = document.getElementById('dropzone');
		const pasteArea = document.getElementById('pasteArea');
		const renderBtn = document.getElementById('renderBtn');
		const clearBtn = document.getElementById('clearBtn');
		const diffOutput = document.getElementById('diffOutput');

		function attachFileToggles(){
			diffOutput.querySelectorAll('.d2h-file-wrapper').forEach(fileWrapper=>{
				const header = fileWrapper.querySelector('.d2h-file-header');
				const fileDiff = fileWrapper.querySelector('.d2h-file-diff, .d2h-files-diff');
				if(!header || !fileDiff || header.querySelector('.file-toggle')){
					return;
				}

				const button = document.createElement('button');
				button.type = 'button';
				button.className = 'file-toggle';
				button.textContent = '折りたたむ';
				button.addEventListener('click',()=>{
					const collapsed = fileWrapper.classList.toggle('is-collapsed');
					button.textContent = collapsed ? '展開' : '折りたたむ';
					button.setAttribute('aria-expanded', String(!collapsed));
				});
				button.setAttribute('aria-expanded', 'true');
				header.appendChild(button);
			});
		}

		function renderDiff(diffText){
			if(!diffText || !diffText.trim()){
				diffOutput.innerHTML = '<em>差分が空です。ファイルをアップロードするかテキストを貼り付けてください。</em>';
				return;
			}
			const configuration = {
				drawFileList: true,
				fileListToggle: true,
				matching: 'lines',
				outputFormat: 'side-by-side'
			};
			try{
				const html = Diff2Html.html(diffText, configuration);
				diffOutput.innerHTML = html;
				attachFileToggles();
				if(window.hljs){
					// highlight.js の推奨 API を使って、出力内のすべてのコードブロックをハイライトする
					diffOutput.querySelectorAll('pre code').forEach(block=>{
						try{ hljs.highlightElement(block); }catch(e){ /* safe-ignore */ }
					});
				}
			}catch(e){
				diffOutput.innerHTML = '<pre style="color:red">表示エラー: '+(e.message||e)+'</pre>'
			}
		}

		dropzone.addEventListener('click',()=>fileInput.click());
		dropzone.addEventListener('dragover',e=>{e.preventDefault();dropzone.style.borderColor='#7aa0f7'});
		dropzone.addEventListener('dragleave',e=>{e.preventDefault();dropzone.style.borderColor='#cbd5e1'});
		dropzone.addEventListener('drop',e=>{
			e.preventDefault();dropzone.style.borderColor='#cbd5e1';
			const f = e.dataTransfer.files && e.dataTransfer.files[0];
			if(f) readFile(f);
		});

		fileInput.addEventListener('change',()=>{
			const f = fileInput.files && fileInput.files[0];
			if(f) readFile(f);
		});

		function readFile(file){
			const reader = new FileReader();
			reader.onload = ()=>{
				const text = String(reader.result || '');
				pasteArea.value = text;
				renderDiff(text);
			};
			reader.onerror = ()=>{
				diffOutput.innerHTML = '<pre style="color:red">ファイル読み込みエラー</pre>'
			};
			reader.readAsText(file);
		}

		renderBtn.addEventListener('click',()=>renderDiff(pasteArea.value));
		clearBtn.addEventListener('click',()=>{pasteArea.value='';diffOutput.innerHTML='';});

		// ペースト時に即レンダー
		pasteArea.addEventListener('paste', (e)=>{
			setTimeout(()=>{
				renderDiff(pasteArea.value);
			},50);
		});

		// 初期サンプル (任意)
		const sample = `diff --git a/README.md b/README.md\nindex e69de29..4b825dc 100644\n--- a/README.md\n+++ b/README.md\n@@ -0,0 +1,2 @@\n+Hello\n+World\n`;
		// pasteArea.value = sample; // コメント解除でサンプルを表示
	</script>
</body>
</html>
