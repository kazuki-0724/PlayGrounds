<!DOCTYPE html>
<html class="light" lang="ja">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Aura Commerce | AI Shopping Assistant</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#0058be",
            "primary-container": "#2170e4",
            "surface": "#f8f9fa",
            "surface-variant": "#e1e3e4",
            "on-surface": "#191c1d",
            "outline-variant": "#c2c6d6"
          },
          fontFamily: {
            "headline": ["Inter"],
            "body": ["Inter"]
          }
        }
      }
    }
  </script>
  <link href="./code.css" rel="stylesheet" />
</head>
<body class="bg-surface selection:bg-blue-100 selection:text-blue-900">
  <header class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-xl shadow-[0_12px_40px_rgba(25,28,29,0.05)]">
    <div class="flex items-center justify-between px-6 py-3 w-full max-w-7xl mx-auto">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-primary to-primary-container flex items-center justify-center ai-orb-glow">
          <span class="material-symbols-outlined text-white text-[18px]">smart_toy</span>
        </div>
        <h1 class="text-xl font-bold tracking-tighter text-blue-700 font-headline">Aura Commerce</h1>
      </div>
      <div class="text-xs font-semibold text-slate-500">Gemini x MCP</div>
    </div>
  </header>

  <main id="chatMessages" class="pt-20 pb-36 px-4 max-w-2xl mx-auto flex flex-col gap-6">
    <div class="flex flex-col gap-2 items-start">
      <div class="bg-white p-5 rounded-2xl rounded-tl-none max-w-[90%] shadow-[0_12px_40px_rgba(25,28,29,0.05)] border border-outline-variant/30">
        <p class="leading-relaxed text-on-surface">こんにちは。社員情報の取得なら、社員IDを指定して質問してください。例: E001の部署を教えて。</p>
      </div>
    </div>
  </main>

  <div class="fixed bottom-6 left-0 w-full px-4 z-40">
    <div class="max-w-2xl mx-auto">
      <div class="bg-white/90 backdrop-blur-2xl rounded-2xl shadow-[0_12px_40px_rgba(25,28,29,0.1)] p-2 flex items-center gap-2 border border-outline-variant/20">
        <input
          id="promptInput"
          class="flex-1 bg-transparent border-none focus:ring-0 text-on-surface placeholder:text-slate-400 text-sm py-3 px-2"
          placeholder="例: 社員E001とE002の部署を教えて"
          type="text"
        />
        <button
          id="sendButton"
          class="w-11 h-11 bg-primary text-white rounded-xl flex items-center justify-center shadow-lg active:scale-95 transition-transform"
          type="button"
          aria-label="送信"
        >
          <span class="material-symbols-outlined">arrow_upward</span>
        </button>
      </div>
    </div>
  </div>

  <script src="./code.js" defer></script>
</body>
</html>
