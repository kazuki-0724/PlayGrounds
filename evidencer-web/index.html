<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>証跡作成WEBアプリケーション</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Material Icons -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for JSX compilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- JSZip -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

  <style>
    body { 
      font-family: 'Roboto', sans-serif; 
      background-color: #f5f5f5; 
    }
    .md-input {
      border: none;
      border-bottom: 1px solid #9e9e9e;
      background-color: transparent;
      padding: 8px 0;
      transition: border-bottom-color 0.2s;
    }
    .md-input:focus {
      outline: none;
      border-bottom: 2px solid #1976d2;
      padding-bottom: 7px;
    }
    .md-label {
      font-size: 0.75rem;
      color: #757575;
      margin-bottom: 4px;
      display: block;
    }
    /* スクロールバーのカスタマイズ */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #999; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // 簡易IDジェネレーター
    const generateId = () => Math.random().toString(36).substring(2, 9);
    
    // LocalStorage Key
    const STORAGE_KEY = 'evidence_app_save_data';
    const TAB_STORAGE_KEY = 'evidence_app_active_tab';

    // デフォルトのマトリクス状態
    const defaultMatrixState = () => [{
      id: generateId(),
      name: '',
      conditions: [{ id: generateId(), name: '', values: [{ id: generateId(), value: '' }] }],
      results: [{ id: generateId(), name: '', values: [{ id: generateId(), value: '' }] }],
      patterns: []
    }];

    /* =======================================
       IndexedDB ユーティリティ
    ======================================= */
    const DB_NAME = 'EvidenceAppDB';
    const DB_VERSION = 1;
    const STORE_NAME = 'matrices_store';
    const RECORD_KEY = 'main_matrices';

    const initDB = () => {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onupgradeneeded = (event) => {
          const db = event.target.result;
          if (!db.objectStoreNames.contains(STORE_NAME)) {
            db.createObjectStore(STORE_NAME);
          }
        };
        request.onsuccess = (event) => resolve(event.target.result);
        request.onerror = (event) => reject(event.target.error);
      });
    };

    const saveToDB = async (data) => {
      const db = await initDB();
      return new Promise((resolve, reject) => {
        const transaction = db.transaction([STORE_NAME], 'readwrite');
        const store = transaction.objectStore(STORE_NAME);
        const request = store.put(data, RECORD_KEY);
        request.onsuccess = () => resolve();
        request.onerror = (event) => reject(event.target.error);
      });
    };

    const loadFromDB = async () => {
      const db = await initDB();
      return new Promise((resolve, reject) => {
        const transaction = db.transaction([STORE_NAME], 'readonly');
        const store = transaction.objectStore(STORE_NAME);
        const request = store.get(RECORD_KEY);
        request.onsuccess = (event) => resolve(event.target.result);
        request.onerror = (event) => reject(event.target.error);
      });
    };

    const clearDB = async () => {
      const db = await initDB();
      return new Promise((resolve, reject) => {
        const transaction = db.transaction([STORE_NAME], 'readwrite');
        const store = transaction.objectStore(STORE_NAME);
        const request = store.delete(RECORD_KEY);
        request.onsuccess = () => resolve();
        request.onerror = (event) => reject(event.target.error);
      });
    };

    /* =======================================
       メインアプリケーション
    ======================================= */
    const App = () => {
      // タブ状態の復元
      const [activeTab, setActiveTab] = useState(() => {
        return localStorage.getItem(TAB_STORAGE_KEY) || 'matrix';
      });

      const [showConfirmModal, setShowConfirmModal] = useState(false);
      const [saveStatus, setSaveStatus] = useState('');
      const isInitialMount = useRef(true);

      // マトリクス状態の復元
      const [matrices, setMatrices] = useState(defaultMatrixState());
      const [isLoaded, setIsLoaded] = useState(false);

      // 初期データの読み込み (IndexedDB)
      useEffect(() => {
        const loadData = async () => {
          try {
            const savedData = await loadFromDB();
            if (savedData) {
              setMatrices(savedData);
            } else {
              // 旧バージョン (localStorage) からのマイグレーション
              const oldSaved = localStorage.getItem(STORAGE_KEY);
              if (oldSaved) {
                const parsed = JSON.parse(oldSaved);
                setMatrices(parsed);
                await saveToDB(parsed);
                localStorage.removeItem(STORAGE_KEY);
              }
            }
          } catch (e) {
            console.error("セーブデータの読み込みに失敗しました", e);
          } finally {
            setIsLoaded(true);
          }
        };
        loadData();
      }, []);

      // --- オートセーブ機能 ---
      useEffect(() => {
        localStorage.setItem(TAB_STORAGE_KEY, activeTab);
      }, [activeTab]);

      useEffect(() => {
        if (!isLoaded) return;
        if (isInitialMount.current) {
          isInitialMount.current = false;
          return; // 初回マウント時はセーブを走らせない
        }

        // 画像の巨大データ（originalDataUrl, dataUrl）を除外して保存
        const dataToSave = matrices.map(m => ({
          ...m,
          patterns: m.patterns.map(p => ({
            ...p,
            images: p.images.map(img => ({
              id: img.id,
              name: img.name,
              drawDataUrl: img.drawDataUrl || null
              // base64画像データは保存しない
            }))
          }))
        }));

        saveToDB(dataToSave)
          .then(() => {
            setSaveStatus('自動保存しました');
            setTimeout(() => setSaveStatus(''), 2000);
          })
          .catch((e) => {
            console.error("オートセーブエラー", e);
            setSaveStatus('保存失敗');
          });
      }, [matrices, isLoaded]);

      // マトリクスの追加・更新・削除
      const addMatrix = () => {
        setMatrices([...matrices, ...defaultMatrixState()]);
      };
      
      const updateMatrix = (id, field, value) => {
        setMatrices(matrices.map(m => m.id === id ? { ...m, [field]: value } : m));
      };
      
      const removeMatrix = (id) => {
        setMatrices(matrices.filter(m => m.id !== id));
      };

      // 全データクリア処理
      const handleClearAllData = async () => {
        if (window.confirm("保存されているすべてのデータを削除して初期化しますか？\n（この操作は元に戻せません）")) {
          await clearDB();
          localStorage.removeItem(TAB_STORAGE_KEY);
          setMatrices(defaultMatrixState());
          setActiveTab('matrix');
        }
      };

      // マトリクスのインポート処理（既存のマトリクスをクリアして置き換え）
      const addImportedMatrices = (importedData) => {
        const newMatrices = importedData.map(m => ({
          id: generateId(),
          name: m.name || '',
          conditions: (m.conditions || []).map(c => ({
            id: generateId(),
            name: c.name || '',
            values: (c.values && c.values.length > 0 ? c.values : [{ value: '' }]).map(v => ({ id: generateId(), value: v.value || '' }))
          })),
          results: (m.results || []).map(r => ({
            id: generateId(),
            name: r.name || '',
            values: (r.values && r.values.length > 0 ? r.values : [{ value: '' }]).map(v => ({ id: generateId(), value: v.value || '' }))
          })),
          patterns: []
        }));
        setMatrices(newMatrices);
      };

      // 現在のマトリクス定義をJSONでエクスポートする処理
      const handleExportJson = () => {
        const exportData = matrices.map(m => ({
          name: m.name,
          conditions: m.conditions.map(c => ({
            name: c.name,
            values: c.values.map(v => ({ value: v.value }))
          })),
          results: m.results.map(r => ({
            name: r.name,
            values: r.values.map(v => ({ value: v.value }))
          }))
        }));
        
        const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = "matrices_template.json";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      };

      // 実際の証跡作成（パターン自動生成処理）
      const executeCreateEvidence = () => {
        const newMatrices = matrices.map(m => {
          // 有効な条件項目のみ抽出
          const validConditions = m.conditions.filter(c => c.name.trim() && c.values.some(v => v.value.trim()));
          
          if (validConditions.length === 0) return { ...m, patterns: [] };

          // 各条件の値の配列を作成
          const conditionArrays = validConditions.map(c => 
            c.values.map(v => v.value.trim()).filter(Boolean).map(v => ({ type: 'condition', name: c.name, value: v }))
          );

          // 直積（組み合わせ）の計算
          const calcCartesian = (arrs) => arrs.length > 0 ? arrs.reduce((acc, curr) => {
            const res = [];
            acc.forEach(a => curr.forEach(b => res.push([...a, b])));
            return res;
          }, [[]]) : [];

          const combinations = calcCartesian(conditionArrays);

          // パターン情報の生成
          const newPatterns = combinations.map((combo, index) => {
            const conditionValues = {};
            combo.forEach(item => {
              if (item.type === 'condition') conditionValues[item.name] = item.value;
            });

            // 既存パターンとのマッチング
            const existing = m.patterns.find(ep => 
              Object.keys(conditionValues).every(k => ep.conditionValues[k] === conditionValues[k]) &&
              Object.keys(ep.conditionValues).length === Object.keys(conditionValues).length
            );

            // 結果入力値は既存のものを引き継ぐか、新規項目の場合は空文字
            const resultValues = existing ? { ...existing.resultValues } : {};
            m.results.forEach(r => {
              if (r.name.trim() && !resultValues.hasOwnProperty(r.name)) {
                resultValues[r.name] = '';
              }
            });

            return {
              id: existing ? existing.id : generateId(),
              conditionValues: existing ? { ...existing.conditionValues } : conditionValues,
              resultValues: resultValues,
              note: existing ? existing.note || '' : '',
              images: existing ? existing.images : [],
              isSkipped: existing ? existing.isSkipped : false
            };
          });

          return { ...m, patterns: newPatterns };
        });

        setMatrices(newMatrices);
        setActiveTab('evidence');
        window.scrollTo(0, 0);
      };

      // 「作成」ボタン押下時の処理（確認モーダルの制御）
      const handleCreateEvidence = () => {
        const hasData = matrices.some(m => m.patterns && m.patterns.some(p => p.images && p.images.length > 0));
        if (hasData) {
          setShowConfirmModal(true);
        } else {
          executeCreateEvidence();
        }
      };

      // マークダウンと画像の一括ダウンロード (ZIP)
      const handleExport = async () => {
        const zip = new JSZip();
        const assetsFolder = zip.folder("assets");
        let mdContent = "# テスト証跡\n\n";
        let hasWarning = false;

        matrices.forEach((m, mIdx) => {
          if (m.patterns.length === 0) return;
          mdContent += `## ${m.name || 'マトリクス ' + (mIdx + 1)}\n\n`;

          m.patterns.forEach((p, pIdx) => {
            mdContent += `### PTN ${pIdx + 1}\n`;
            
            if (p.isSkipped) {
              mdContent += `**【実施不要】**\n\n`;
            }

            mdContent += `**[条件]**\n`;
            Object.entries(p.conditionValues).forEach(([k, v]) => {
              mdContent += `- ${k}: ${v}\n`;
            });
            mdContent += `\n`;

            mdContent += `**[結果]**\n`;
            Object.entries(p.resultValues).forEach(([k, v]) => {
              mdContent += `- ${k}: ${v || '未入力'}\n`;
            });
            mdContent += `\n`;

            if (p.note) {
              mdContent += `**[備考]**\n${p.note}\n\n`;
            }

            if (p.images.length > 0 && !p.isSkipped) {
              // originalDataUrlが存在するもの（復元済み・アップロード済みのもの）のみ出力対象とする
              const validImages = p.images.filter(img => img.originalDataUrl);
              
              if (validImages.length < p.images.length) {
                hasWarning = true;
              }

              if (validImages.length > 0) {
                mdContent += `**[証跡画像]**\n`;
                validImages.forEach((img, iIdx) => {
                  const fileName = img.name; 
                  mdContent += `<img src="./assets/${fileName}" alt="証跡" style="max-height: 500px;" />\n`;
                  const base64Data = img.dataUrl.split(',')[1];
                  assetsFolder.file(fileName, base64Data, {base64: true});
                });
                mdContent += `\n`;
              }
            }
            mdContent += `---\n\n`;
          });
        });

        if (hasWarning) {
          alert("【警告】再アップロード待ち状態（待機中）の画像が含まれています。待機中の画像は出力ファイルに含まれません。");
        }

        zip.file("evidence.md", mdContent);

        try {
          const content = await zip.generateAsync({ type: "blob" });
          const url = URL.createObjectURL(content);
          const a = document.createElement('a');
          a.href = url;
          a.download = "evidence_export.zip";
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
        } catch (e) {
          console.error("出力に失敗しました: " + e.message);
        }
      };

      return (
        <div className="min-h-screen flex flex-col">
          {/* Header */}
          <header className="bg-indigo-600 text-white shadow-md z-10">
            <div className="px-6 py-4 flex justify-between items-center">
              <h1 className="text-xl font-bold flex items-center">
                <span className="material-icons mr-2">fact_check</span>
                証跡作成アプリ
              </h1>
              <div className="flex items-center gap-4">
                {saveStatus && (
                  <span className="text-xs bg-indigo-500 px-2 py-1 rounded text-indigo-50 animate-pulse flex items-center">
                    <span className="material-icons text-[14px] mr-1">cloud_done</span>{saveStatus}
                  </span>
                )}
                <button 
                  onClick={handleClearAllData}
                  className="text-indigo-200 hover:text-white text-xs underline px-2 py-1 transition-colors"
                  title="保存されているすべてのデータを初期化します"
                >
                  全データクリア
                </button>

                {activeTab === 'matrix' && (
                  <button 
                    onClick={handleExportJson}
                    className="bg-indigo-500 text-white border border-indigo-400 px-4 py-2 rounded shadow hover:bg-indigo-400 flex items-center text-sm font-bold transition-colors"
                  >
                    <span className="material-icons mr-2 text-[18px]">download</span>
                    マトリクス保存(JSON)
                  </button>
                )}
                {activeTab === 'evidence' && (
                  <button 
                    onClick={handleExport}
                    className="bg-white text-indigo-600 px-4 py-2 rounded shadow hover:bg-gray-100 flex items-center text-sm font-bold transition-colors"
                  >
                    <span className="material-icons mr-2 text-[18px]">download</span>
                    マークダウン出力
                  </button>
                )}
              </div>
            </div>
            {/* Tabs */}
            <div className="flex px-6 space-x-6">
              <button 
                className={`py-3 uppercase text-sm font-bold border-b-4 transition-colors ${activeTab === 'matrix' ? 'border-white text-white' : 'border-transparent text-indigo-200 hover:text-white'}`}
                onClick={() => setActiveTab('matrix')}
              >
                テストマトリクス入力
              </button>
              <button 
                className={`py-3 uppercase text-sm font-bold border-b-4 transition-colors ${activeTab === 'evidence' ? 'border-white text-white' : 'border-transparent text-indigo-200 hover:text-white'}`}
                onClick={() => setActiveTab('evidence')}
              >
                証跡作成プレビュー
              </button>
            </div>
          </header>

          {/* Main Content */}
          <main className="flex-1 p-6 overflow-auto">
            <div className="max-w-5xl mx-auto pb-20">
              {!isLoaded ? (
                <div className="text-center text-gray-500 mt-20">
                  <span className="material-icons animate-pulse text-4xl text-indigo-400">sync</span>
                  <p className="mt-4 font-bold text-lg">データを読み込んでいます...</p>
                </div>
              ) : activeTab === 'matrix' ? (
                <MatrixInputView 
                  matrices={matrices} 
                  updateMatrix={updateMatrix} 
                  removeMatrix={removeMatrix} 
                  addMatrix={addMatrix}
                  addImportedMatrices={addImportedMatrices}
                  onCreate={handleCreateEvidence}
                />
              ) : (
                <EvidenceCreationView 
                  matrices={matrices} 
                  setMatrices={setMatrices} 
                />
              )}
            </div>
          </main>

          {/* 証跡再作成時の確認モーダル */}
          {showConfirmModal && (
            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
              <div className="bg-white p-6 rounded shadow-lg max-w-sm">
                <h3 className="text-lg font-bold mb-4 flex items-center text-yellow-600">
                  <span className="material-icons mr-2">warning</span>確認
                </h3>
                <p className="mb-6 text-sm text-gray-700">
                  既にアップロードされた証跡画像が存在します。構成を変更して再作成すると、条件に合致しなくなったPTNの画像データは失われる可能性があります。<br/><br/>作成を実行しますか？
                </p>
                <div className="flex justify-end gap-3">
                  <button onClick={() => setShowConfirmModal(false)} className="px-4 py-2 border rounded hover:bg-gray-100 text-sm font-bold transition-colors">キャンセル</button>
                  <button onClick={() => { setShowConfirmModal(false); executeCreateEvidence(); }} className="px-4 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700 text-sm font-bold transition-colors">作成を実行する</button>
                </div>
              </div>
            </div>
          )}

          {/* 証跡作成プレビュー時のみ表示する上部へ戻るFAB */}
          {activeTab === 'evidence' && <ScrollToTopFAB />}
        </div>
      );
    };

    /* =======================================
       コンポーネント: 上に戻る FAB
    ======================================= */
    const ScrollToTopFAB = () => {
      const [isVisible, setIsVisible] = useState(false);

      useEffect(() => {
        const toggleVisibility = () => setIsVisible(window.scrollY > 300);
        window.addEventListener("scroll", toggleVisibility);
        return () => window.removeEventListener("scroll", toggleVisibility);
      }, []);

      if (!isVisible) return null;

      return (
        <button
          onClick={() => window.scrollTo({ top: 0, behavior: "smooth" })}
          className="fixed bottom-8 right-8 bg-indigo-600 text-white w-14 h-14 rounded-full shadow-lg flex items-center justify-center hover:bg-indigo-700 transition-all z-50 focus:outline-none hover:scale-105 active:scale-95"
          title="上に戻る"
        >
          <span className="material-icons">arrow_upward</span>
        </button>
      );
    };

    /* =======================================
       コンポーネント: インポート用モーダル
    ======================================= */
    const ImportModal = ({ onClose, onImport }) => {
      const [error, setError] = useState('');

      const handleFileChange = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const data = JSON.parse(ev.target.result);
            if (!Array.isArray(data)) throw new Error('JSONのルートは配列である必要があります。');
            onImport(data);
          } catch (err) {
            setError('ファイルの読み込みに失敗しました。正しいJSON形式か確認してください。');
          }
        };
        reader.readAsText(file);
        e.target.value = '';
      };

      return (
        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-[70] p-4">
          <div className="bg-white p-6 rounded shadow-lg max-w-2xl w-full">
            <h3 className="text-lg font-bold mb-4 flex items-center text-indigo-800">
              <span className="material-icons mr-2">upload_file</span>マトリクスをインポート
            </h3>
            <p className="mb-2 text-sm text-gray-700">
              JSON形式のファイルを選択してインポートしてください。<br/>
              <strong className="text-red-500">※インポートを実行すると、現在作成中のマトリクスはクリアされます。</strong>
            </p>
            {error && <p className="text-red-500 text-sm mb-4 bg-red-50 p-2 rounded">{error}</p>}
            <div className="mb-6">
              <input 
                type="file" accept=".json" onChange={handleFileChange} 
                className="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 cursor-pointer"
              />
            </div>
            <div className="flex justify-end gap-3">
              <button onClick={onClose} className="px-4 py-2 border rounded hover:bg-gray-100 text-sm font-bold transition-colors">キャンセル</button>
            </div>
          </div>
        </div>
      );
    };

    /* =======================================
       コンポーネント: 待機中画像の復元モーダル
    ======================================= */
    const PendingImageModal = ({ image, onClose, onRestore }) => {
      const handleFileChange = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        // ファイル名が異なる場合の警告
        if (file.name !== image.name) {
          if (!window.confirm(`選択されたファイル名が元の名前と異なります。\n\n・期待されるファイル名: ${image.name}\n・選択されたファイル名: ${file.name}\n\nこのファイルを使用して復元を強行しますか？`)) {
            e.target.value = '';
            return;
          }
        }

        const reader = new FileReader();
        reader.onload = (ev) => {
          onRestore(image.id, file.name, ev.target.result);
        };
        reader.readAsDataURL(file);
      };

      return (
        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-[70] p-4">
          <div className="bg-white p-6 rounded shadow-lg max-w-md w-full">
            <h3 className="text-lg font-bold mb-4 flex items-center text-indigo-800">
              <span className="material-icons mr-2">cloud_sync</span>待機中画像の復元
            </h3>
            <div className="mb-4">
              <p className="text-sm text-gray-600 mb-1">復元対象のファイル名:</p>

    /* =======================================
       コンポーネント: 画像マークアップモーダル
    ======================================= */
    const ImageMarkupModal = ({ image, onClose, onSave }) => {
      const canvasRef = React.useRef(null);
      const [isDrawing, setIsDrawing] = useState(false);
      const [tool, setTool] = useState('pen'); // 'pen', 'rect', 'eraser'
      const [color, setColor] = useState('#ff0000');
      const [lineWidth, setLineWidth] = useState(3);
      
      const [startX, setStartX] = useState(0);
      const [startY, setStartY] = useState(0);
      const [savedImageData, setSavedImageData] = useState(null);

      // オリジナル画像、なければ現在画像を背景レイヤーとして使用
      const baseImgSrc = image.originalDataUrl || image.dataUrl;

      useEffect(() => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        
        const bgImg = new Image();
        bgImg.onload = () => {
          canvas.width = bgImg.width;
          canvas.height = bgImg.height;
          
          if (image.drawDataUrl) {
            const fgImg = new Image();
            fgImg.onload = () => ctx.drawImage(fgImg, 0, 0);
            fgImg.src = image.drawDataUrl;
          }
        };
        bgImg.src = baseImgSrc;
      }, [image, baseImgSrc]);

      const getCoordinates = (e) => {
        const canvas = canvasRef.current;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        
        let clientX = e.touches ? e.touches[0].clientX : e.clientX;
        let clientY = e.touches ? e.touches[0].clientY : e.clientY;

        return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
      };

      const startDrawing = (e) => {
        const ctx = canvasRef.current.getContext('2d');
        const { x, y } = getCoordinates(e);
        setStartX(x);
        setStartY(y);
        setIsDrawing(true);

        if (tool === 'rect') {
          setSavedImageData(ctx.getImageData(0, 0, canvasRef.current.width, canvasRef.current.height));
        } else {
          ctx.beginPath();
          ctx.moveTo(x, y);
        }
      };

      const draw = (e) => {
        if (!isDrawing) return;
        const ctx = canvasRef.current.getContext('2d');
        const { x, y } = getCoordinates(e);
        
        ctx.globalCompositeOperation = tool === 'eraser' ? 'destination-out' : 'source-over';
        
        if (tool === 'rect') {
          ctx.putImageData(savedImageData, 0, 0);
          ctx.beginPath();
          ctx.rect(startX, startY, x - startX, y - startY);
          ctx.strokeStyle = color;
          ctx.lineWidth = lineWidth;
          ctx.stroke();
        } else {
          ctx.lineTo(x, y);
          ctx.strokeStyle = tool === 'eraser' ? 'rgba(0,0,0,1)' : color;
          ctx.lineWidth = lineWidth;
          ctx.lineCap = 'round';
          ctx.lineJoin = 'round';
          ctx.stroke();
        }
      };

      const stopDrawing = () => setIsDrawing(false);

      const handleClearAll = () => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      };

      const handleSave = () => {
        const fgCanvas = canvasRef.current;
        const drawDataUrl = fgCanvas.toDataURL('image/png');

        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = fgCanvas.width;
        tempCanvas.height = fgCanvas.height;
        const tCtx = tempCanvas.getContext('2d');
        
        const bgImg = new Image();
        bgImg.onload = () => {
          tCtx.drawImage(bgImg, 0, 0);
          tCtx.drawImage(fgCanvas, 0, 0);
          onSave({ drawDataUrl, dataUrl: tempCanvas.toDataURL('image/png') });
        };
        bgImg.src = baseImgSrc;
      };

      useEffect(() => {
        const canvas = canvasRef.current;
        const preventScroll = (e) => e.preventDefault();
        canvas.addEventListener('touchstart', preventScroll, { passive: false });
        canvas.addEventListener('touchmove', preventScroll, { passive: false });
        return () => {
          canvas.removeEventListener('touchstart', preventScroll);
          canvas.removeEventListener('touchmove', preventScroll);
        };
      }, []);

      return (
        <div className="fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center z-[60] p-4">
          <div className="bg-white rounded-lg flex flex-col w-full max-w-4xl max-h-full overflow-hidden shadow-2xl">
            <div className="p-3 border-b flex flex-wrap justify-between items-center bg-gray-50 gap-4">
              <h3 className="font-bold text-gray-800 flex items-center">
                <span className="material-icons mr-1 text-indigo-600">draw</span>画像マークアップ
              </h3>
              
              <div className="flex gap-4 items-center bg-white px-3 py-1 rounded shadow-sm border border-gray-200">
                <div className="flex items-center gap-1 bg-gray-100 p-1 rounded">
                  <button onClick={() => setTool('pen')} className={`p-1 flex items-center justify-center rounded transition-colors ${tool === 'pen' ? 'bg-indigo-600 text-white shadow' : 'text-gray-600 hover:bg-gray-200'}`} title="ペン">
                    <span className="material-icons text-[18px]">edit</span>
                  </button>
                  <button onClick={() => setTool('rect')} className={`p-1 flex items-center justify-center rounded transition-colors ${tool === 'rect' ? 'bg-indigo-600 text-white shadow' : 'text-gray-600 hover:bg-gray-200'}`} title="四角形">
                    <span className="material-icons text-[18px]">crop_square</span>
                  </button>
                  <button onClick={() => setTool('eraser')} className={`p-1 flex items-center justify-center rounded transition-colors ${tool === 'eraser' ? 'bg-indigo-600 text-white shadow' : 'text-gray-600 hover:bg-gray-200'}`} title="消しゴム（描いた線を消す）">
                    <svg xmlns="http://www.w3.org/2000/svg" height="18" viewBox="0 0 24 24" width="18" fill="currentColor">
                      <path d="M0 0h24v24H0V0z" fill="none"/>
                      <path d="M15.48 3.51c-.39-.39-1.02-.39-1.41 0l-9.56 9.56c-.39.39-.39 1.02 0 1.41l5.09 5.09c.39.39 1.02.39 1.41 0l9.56-9.56c.39-.39.39-1.02 0-1.41l-5.09-5.09zm1.41 5.09l-7.09 7.09-2.26-2.26 7.09-7.09 2.26 2.26z"/>
                      <path d="M19 19h-5v2h7v-2h-2z"/>
                    </svg>
                  </button>
                </div>
                
                <div className="h-6 w-px bg-gray-300"></div>
                
                <div className="flex items-center gap-1">
                  <label className="text-xs text-gray-500 font-bold">色:</label>
                  <input type="color" value={color} onChange={e => setColor(e.target.value)} disabled={tool === 'eraser'} className={`w-6 h-6 border-0 p-0 ${tool === 'eraser' ? 'opacity-50 cursor-not-allowed' : 'cursor-pointer'}`} />
                </div>
                <div className="flex items-center gap-2">
                  <label className="text-xs text-gray-500 font-bold">太さ: {lineWidth}</label>
                  <input type="range" min="1" max="40" value={lineWidth} onChange={e => setLineWidth(e.target.value)} className="w-24" />
                </div>

                <div className="h-6 w-px bg-gray-300"></div>

                <button onClick={handleClearAll} className="p-1 flex items-center justify-center rounded text-red-600 hover:bg-red-100 transition-colors" title="すべての手書きデータを削除">
                  <span className="material-icons text-[18px]">delete_sweep</span>
                </button>
              </div>

              <div className="flex gap-2">
                <button onClick={onClose} className="px-3 py-1.5 border rounded hover:bg-gray-100 text-sm font-bold transition-colors">キャンセル</button>
                <button onClick={handleSave} className="px-3 py-1.5 bg-indigo-600 text-white rounded hover:bg-indigo-700 text-sm font-bold flex items-center transition-colors">
                  <span className="material-icons text-[16px] mr-1">save</span>保存
                </button>
              </div>
            </div>
            
            <div className="flex-1 overflow-auto p-4 bg-gray-200 flex justify-center items-center">
              <canvas
                ref={canvasRef}
                onMouseDown={startDrawing}
                onMouseMove={draw}
                onMouseUp={stopDrawing}
                onMouseOut={stopDrawing}
                onTouchStart={startDrawing}
                onTouchMove={draw}
                onTouchEnd={stopDrawing}
                className={`shadow ${tool === 'eraser' ? 'cursor-cell' : 'cursor-crosshair'}`}
                style={{ 
                  maxWidth: '100%', maxHeight: '70vh', objectFit: 'contain',
                  backgroundImage: `url(${baseImgSrc})`, backgroundSize: '100% 100%', backgroundRepeat: 'no-repeat'
                }}
              ></canvas>
            </div>
            <div className="p-2 bg-gray-100 text-center text-xs text-gray-500">
              キャンバス上をドラッグしてマークアップできます
            </div>
          </div>
        </div>
      );
    };

    const PatternCard = ({ pattern, patternIndex, matrix, setMatrices }) => {
      const [editingImage, setEditingImage] = useState(null);
      const [selectedPendingImage, setSelectedPendingImage] = useState(null);

      const updatePatternValue = (type, key, val) => {
        setMatrices(prev => prev.map(m => {
          if (m.id !== matrix.id) return m;
          return {
            ...m,
            patterns: m.patterns.map(p => {
              if (p.id !== pattern.id) return p;
              if (type === 'condition') return { ...p, conditionValues: { ...p.conditionValues, [key]: val } };
              if (type === 'result') return { ...p, resultValues: { ...p.resultValues, [key]: val } };
              if (type === 'note') return { ...p, note: val };
              return p;
            })
          };
        }));
      };

      const toggleSkip = () => {
        setMatrices(prev => prev.map(m => {
          if (m.id !== matrix.id) return m;
          return {
            ...m,
            patterns: m.patterns.map(p => {
              if (p.id !== pattern.id) return p;
              return { ...p, isSkipped: !p.isSkipped };
            })
          };
        }));
      };

      const saveEditedImage = (newData) => {
        setMatrices(prev => prev.map(m => {
          if (m.id !== matrix.id) return m;
          return {
            ...m,
            patterns: m.patterns.map(p => {
              if (p.id !== pattern.id) return p;
              return {
                ...p,
                images: p.images.map(img => img.id === editingImage.id ? { ...img, dataUrl: newData.dataUrl, drawDataUrl: newData.drawDataUrl } : img)
              };
            })
          };
        }));
        setEditingImage(null);
      };

      // 待機中画像の強制復元処理
      const handleRestorePendingImage = (imgId, uploadedFileName, uploadedDataUrl) => {
        setMatrices(prev => prev.map(m => {
          if (m.id !== matrix.id) return m;
          return {
            ...m,
            patterns: m.patterns.map(p => {
              if (p.id !== pattern.id) return p;
              
              const updatedImages = [...p.images];
              const targetIdx = updatedImages.findIndex(img => img.id === imgId);
              
              if (targetIdx !== -1) {
                const targetImg = updatedImages[targetIdx];
                // ファイル名が異なっていても強行された場合は新しい名前で上書きする
                updatedImages[targetIdx] = { 
                  ...targetImg, 
                  name: uploadedFileName, 
                  originalDataUrl: uploadedDataUrl, 
                  dataUrl: uploadedDataUrl 
                };

                // 描画データがある場合は非同期で合成して上書き更新する
                if (targetImg.drawDataUrl) {
                  const canvas = document.createElement('canvas');
                  const ctx = canvas.getContext('2d');
                  const bgImg = new Image();
                  bgImg.onload = () => {
                    canvas.width = bgImg.width;
                    canvas.height = bgImg.height;
                    ctx.drawImage(bgImg, 0, 0);
                    const fgImg = new Image();
                    fgImg.onload = () => {
                      ctx.drawImage(fgImg, 0, 0);
                      const mergedDataUrl = canvas.toDataURL('image/png');
                      // 非同期での状態更新
                      setMatrices(latest => latest.map(lm => m.id !== lm.id ? lm : {
                        ...lm, patterns: lm.patterns.map(lp => p.id !== lp.id ? lp : {
                          ...lp, images: lp.images.map(limg => limg.id !== imgId ? limg : { ...limg, dataUrl: mergedDataUrl })
                        })
                      }));
                    };
                    fgImg.src = targetImg.drawDataUrl;
                  };
                  bgImg.src = uploadedDataUrl;
                }
              }
              return { ...p, images: updatedImages };
            })
          };
        }));
        setSelectedPendingImage(null);
      };

      // 画像アップロード処理 (通常の一括追加・同名復元)
      const handleFileUpload = async (e) => {
        const files = Array.from(e.target.files);
        if (!files.length) return;

        const uploadedFiles = await Promise.all(files.map(file => {
          return new Promise(resolve => {
            const reader = new FileReader();
            reader.onload = ev => resolve({ name: file.name, dataUrl: ev.target.result });
            reader.readAsDataURL(file);
          });
        }));

        setMatrices(prev => {
          return prev.map(m => {
            if (m.id !== matrix.id) return m;
            return {
              ...m,
              patterns: m.patterns.map(p => {
                if (p.id !== pattern.id) return p;
                
                let updatedImages = [...p.images];
                const newImagesToAdd = [];
                
                uploadedFiles.forEach(uf => {
                  const targetIdx = updatedImages.findIndex(img => img.name === uf.name && !img.originalDataUrl);
                  if (targetIdx !== -1) {
                    const targetImg = updatedImages[targetIdx];
                    updatedImages[targetIdx] = { ...targetImg, originalDataUrl: uf.dataUrl, dataUrl: uf.dataUrl };
                    
                    if (targetImg.drawDataUrl) {
                      const canvas = document.createElement('canvas');
                      const ctx = canvas.getContext('2d');
                      const bgImg = new Image();
                      bgImg.onload = () => {
                        canvas.width = bgImg.width;
                        canvas.height = bgImg.height;
                        ctx.drawImage(bgImg, 0, 0);
                        const fgImg = new Image();
                        fgImg.onload = () => {
                          ctx.drawImage(fgImg, 0, 0);
                          const mergedDataUrl = canvas.toDataURL('image/png');
                          setMatrices(latest => latest.map(lm => m.id !== lm.id ? lm : {
                            ...lm, patterns: lm.patterns.map(lp => p.id !== lp.id ? lp : {
                              ...lp, images: lp.images.map(limg => limg.id !== targetImg.id ? limg : { ...limg, dataUrl: mergedDataUrl })
                            })
                          }));
                        };
                        fgImg.src = targetImg.drawDataUrl;
                      };
                      bgImg.src = uf.dataUrl;
                    }
                  } else {
                    newImagesToAdd.push({
                      id: generateId(),
                      name: uf.name,
                      originalDataUrl: uf.dataUrl,
                      dataUrl: uf.dataUrl,
                      drawDataUrl: null
                    });
                  }
                });

                return { ...p, images: [...updatedImages, ...newImagesToAdd] };
              })
            };
          });
        });
        
        e.target.value = '';
      };

      const removeImage = (imgId) => {
        setMatrices(prev => prev.map(m => {
          if (m.id !== matrix.id) return m;
          return {
            ...m,
            patterns: m.patterns.map(p => {
              if (p.id !== pattern.id) return p;
              return { ...p, images: p.images.filter(img => img.id !== imgId) };
            })
          };
        }));
      };

      return (
        <div className={`bg-white border ${pattern.isSkipped ? 'border-gray-300 bg-gray-50 opacity-75 grayscale' : 'border-gray-200'} rounded-lg p-5 shadow-sm flex flex-col md:flex-row gap-6 hover:border-indigo-300 transition-all relative`}>
          {pattern.isSkipped && (
            <div className="absolute inset-0 bg-gray-200 opacity-20 pointer-events-none rounded-lg z-20"></div>
          )}
          
          <div className="md:w-1/2 space-y-4 relative z-30">
            <div className="flex justify-between items-center border-b pb-2">
              <h3 className="font-bold text-gray-800 flex items-center">
                <span className={`text-xs px-2 py-1 rounded mr-2 ${pattern.isSkipped ? 'bg-gray-300 text-gray-600' : 'bg-indigo-100 text-indigo-800'}`}>PTN {patternIndex + 1}</span>
              </h3>
              <label className="flex items-center cursor-pointer hover:bg-gray-100 px-2 py-1 rounded text-sm text-gray-600 font-bold transition-colors">
                <input type="checkbox" className="mr-2 cursor-pointer w-4 h-4 accent-gray-500" checked={pattern.isSkipped || false} onChange={toggleSkip} />
                実施不要にする
              </label>
            </div>
            
            <div className="bg-gray-50 p-3 rounded border border-gray-100">
              <p className="text-xs font-bold text-gray-500 mb-2 flex items-center"><span className="material-icons text-[14px] mr-1">rule</span>条件</p>
              <ul className="text-sm space-y-2">
                {Object.entries(pattern.conditionValues).map(([k, v]) => (
                  <li key={k} className="flex items-center">
                    <span className="font-bold text-gray-700 w-24 shrink-0 truncate" title={k}>{k}:</span>
                    <input type="text" className="flex-1 bg-white border border-gray-300 rounded px-2 py-1 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors w-full disabled:bg-gray-100" value={v} onChange={(e) => updatePatternValue('condition', k, e.target.value)} disabled={pattern.isSkipped} />
                  </li>
                ))}
              </ul>
            </div>

            <div className="bg-gray-50 p-3 rounded border border-gray-100">
              <p className="text-xs font-bold text-gray-500 mb-2 flex items-center"><span className="material-icons text-[14px] mr-1">done_all</span>結果</p>
              <ul className="text-sm space-y-2">
                {matrix.results.filter(r => r.name.trim()).length > 0 ? (
                  matrix.results.filter(r => r.name.trim()).map(r => {
                    const k = r.name;
                    const v = pattern.resultValues[k] || '';
                    const candidates = r.values.map(val => val.value.trim()).filter(Boolean);
                    
                    return (
                      <li key={r.id} className="flex items-center">
                        <span className="font-bold text-gray-700 w-24 shrink-0 truncate" title={k}>{k}:</span>
                        {candidates.length > 0 ? (
                          <select className="flex-1 bg-white border border-gray-300 rounded px-2 py-1 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors w-full disabled:bg-gray-100" value={v} onChange={(e) => updatePatternValue('result', k, e.target.value)} disabled={pattern.isSkipped}>
                            <option value="">-- 選択してください --</option>
                            {candidates.map((c, i) => <option key={i} value={c}>{c}</option>)}
                          </select>
                        ) : (
                          <input type="text" className="flex-1 bg-white border border-gray-300 rounded px-2 py-1 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors w-full disabled:bg-gray-100" value={v} onChange={(e) => updatePatternValue('result', k, e.target.value)} disabled={pattern.isSkipped} placeholder="結果候補が未設定（直接入力）" />
                        )}
                      </li>
                    );
                  })
                ) : (
                  <li className="text-gray-500 italic text-xs">結果項目の設定がありません</li>
                )}
              </ul>
            </div>

            <div className="bg-gray-50 p-3 rounded border border-gray-100">
              <p className="text-xs font-bold text-gray-500 mb-2 flex items-center"><span className="material-icons text-[14px] mr-1">notes</span>備考</p>
              <textarea className="w-full bg-white border border-gray-300 rounded px-2 py-1 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors text-sm disabled:bg-gray-100 resize-y" rows="2" value={pattern.note || ''} onChange={(e) => updatePatternValue('note', null, e.target.value)} disabled={pattern.isSkipped} placeholder="備考を入力" ></textarea>
            </div>
          </div>

          <div className="md:w-1/2 md:border-l md:border-gray-200 md:pl-6 flex flex-col relative z-30">
            <div className="flex justify-between items-center mb-3">
              <p className="text-xs font-bold text-gray-500 flex items-center">
                <span className="material-icons text-[14px] mr-1">image</span>証跡画像
              </p>
              <label className={`cursor-pointer bg-indigo-50 text-indigo-700 hover:bg-indigo-100 px-3 py-1.5 rounded text-xs font-bold flex items-center transition-colors border border-indigo-200 shadow-sm ${pattern.isSkipped ? 'opacity-50 cursor-not-allowed' : ''}`}>
                <span className="material-icons text-[16px] mr-1">add_photo_alternate</span>
                画像を追加
                <input type="file" multiple accept="image/*" className="hidden" onChange={handleFileUpload} disabled={pattern.isSkipped} />
              </label>
            </div>
            
            <div className="flex-1 bg-gray-50 border border-dashed border-gray-300 rounded p-3 overflow-y-auto max-h-64 flex flex-wrap gap-3 content-start relative">
              {pattern.images.length === 0 && (
                <div className="absolute inset-0 flex flex-col items-center justify-center text-gray-400">
                  <span className="material-icons text-4xl mb-2 opacity-50">photo_library</span>
                  <p className="text-xs font-medium">画像がアップロードされていません</p>
                </div>
              )}
              {pattern.images.map(img => (
                <div key={img.id} className="relative group w-[100px] h-[100px] border border-gray-200 rounded shadow-sm overflow-hidden bg-white z-10 flex-shrink-0">
                  {img.originalDataUrl ? (
                    <img 
                      src={img.dataUrl} 
                      alt={img.name} 
                      className={`w-full h-full object-cover ${pattern.isSkipped ? '' : 'cursor-pointer hover:opacity-75'} transition-opacity`}
                      onClick={() => !pattern.isSkipped && setEditingImage(img)}
                      title={pattern.isSkipped ? "" : "クリックしてマークアップ"}
                    />
                  ) : (
                    <div 
                      className={`w-full h-full flex flex-col items-center justify-center bg-gray-100 text-gray-500 p-2 text-center ${pattern.isSkipped ? '' : 'cursor-pointer hover:bg-gray-200'} transition-colors`}
                      onClick={() => !pattern.isSkipped && setSelectedPendingImage(img)}
                      title={pattern.isSkipped ? "" : "クリックしてファイル名を確認・画像を復元"}
                    >
                      <span className="material-icons text-2xl mb-1 opacity-40">cloud_upload</span>
                      <span className="text-[9px] leading-tight break-all font-bold text-gray-400">待機中</span>
                    </div>
                  )}
                  
                  <div className="absolute bottom-0 left-0 right-0 bg-black bg-opacity-60 text-white text-[10px] truncate px-1 py-0.5 pointer-events-none">
                    {img.name}
                  </div>
                  {!pattern.isSkipped && (
                    <button 
                      onClick={() => removeImage(img.id)}
                      className="absolute top-1 right-1 bg-red-500 text-white rounded-full p-1 opacity-0 group-hover:opacity-100 transition-opacity shadow"
                      title="削除"
                    >
                      <span className="material-icons text-[14px] block">close</span>
                    </button>
                  )}
                </div>
              ))}
            </div>
            
            {pattern.images.some(img => !img.originalDataUrl) && !pattern.isSkipped && (
              <p className="text-[10px] text-red-500 mt-2 font-bold animate-pulse flex items-center">
                <span className="material-icons text-[12px] mr-1">info</span>
                ※「待機中」の画像があります。枠をクリックするか画像を再追加すると復元されます。
              </p>
            )}
          </div>

          {editingImage && (
            <ImageMarkupModal image={editingImage} onClose={() => setEditingImage(null)} onSave={saveEditedImage} />
          )}

          {selectedPendingImage && (
            <PendingImageModal image={selectedPendingImage} onClose={() => setSelectedPendingImage(null)} onRestore={handleRestorePendingImage} />
          )}
        </div>
      );
    };

    // Reactアプリのマウント
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
